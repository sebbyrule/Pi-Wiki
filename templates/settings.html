{% extends "base.html" %} {% block title %}System Settings{% endblock %} {%
block content %}
<div class="max-w-2xl">
  <h1 class="page-head text-3xl mb-1">System Settings</h1>
  <p class="mb-8" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)">Runtime configuration · written to .env</p>

  <div class="space-y-6">
    <div>
      <label class="block mb-2" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Local AI URL</label>
      <input type="text" id="ai-url" value="{{ LOCAL_AI_URL }}" class="field" />
    </div>
    <div>
      <label class="block mb-2" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Dashboard URL</label>
      <input type="text" id="dash-url" value="{{ HOMELAB_DASHBOARD_URL }}" class="field" />
    </div>
    <div>
      <label class="block mb-2" style="font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)">Max Context Tokens</label>
      <input type="number" id="max-tokens" value="{{ MAX_AI_TOKENS }}" class="field" />
    </div>
    <button onclick="saveSettings()" class="btn-solid">Save Settings</button>
  </div>
</div>

<script>
  async function saveSettings() {
    const settings = {
      LOCAL_AI_URL: document.getElementById("ai-url").value,
      HOMELAB_DASHBOARD_URL: document.getElementById("dash-url").value,
      MAX_AI_TOKENS: document.getElementById("max-tokens").value,
    };
    const res = await fetch("/api/settings/update", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(settings),
    });
    if (res.ok) alert("Settings saved!");
  }
</script>
{% endblock %}
