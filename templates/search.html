{% extends "base.html" %}

{% block title %}Search: {{ q }}{% endblock %}

{% block content %}
    <h1 class="text-2xl font-bold mb-4">Search Results for "<span class="text-blue-600">{{ q }}</span>"</h1>
    
    <ul class="space-y-3">
        {% for result in results %}
            <li class="bg-gray-50 p-4 rounded border border-gray-200">
                <a href="/wiki/{{ result }}" class="text-lg font-medium text-blue-600 hover:underline capitalize">
                    {{ result.replace('-', ' ') }}
                </a>
            </li>
        {% else %}
            <p class="text-gray-500 italic">No articles found matching your query.</p>
        {% endfor %}
    </ul>
{% endblock %}
