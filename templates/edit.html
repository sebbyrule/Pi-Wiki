{% extends "base.html" %} 
{% block title %}Editing: {{ page_name }}{% endblock %} 

{% block content %}
<div class="flex justify-between items-center mb-5">
  <h1 class="page-head text-2xl">
    Editing <span style="color:var(--accent)">{{ page_name }}</span>
  </h1>

  <div class="flex items-center gap-4">
    <input type="file" id="imageInput" class="hidden" accept="image/*" />
    <button type="button" onclick="document.getElementById('imageInput').click()" class="btn-ghost">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
      Insert Image
    </button>
    <a href="/wiki/{{ page_name }}" class="meta-action">Cancel</a>
  </div>
</div>

<div class="relative flex flex-col flex-grow">
    <form method="POST" action="/edit/{{ page_name }}" class="flex flex-col flex-grow">
      <textarea
        id="markdown-editor"
        name="content"
        rows="20"
        class="field custom-scrollbar mb-4"
        style="line-height:1.6;resize:vertical"
      >{{ content }}</textarea>

      <div class="flex justify-end">
        <button type="submit" class="btn-solid">Save Page</button>
      </div>
    </form>

    <div id="link-suggestion" class="hidden absolute bottom-20 right-4 px-4 py-3 text-sm flex items-center gap-4 transition-opacity z-50" style="background:var(--ink);color:var(--paper);box-shadow:0 12px 30px -10px rgba(0,0,0,.5)">
        <div>
            <span class="block mb-1" style="font-family:var(--font-mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)">Semantic Match Found</span>
            <span>Link to: <strong id="suggested-page" style="font-family:var(--font-mono);background:rgba(255,255,255,.12);padding:1px 5px"></strong></span>
        </div>
        <button onclick="applySuggestion()" class="btn-solid">Insert</button>
    </div>
</div>

<script>
  // Image Upload Logic
  document.getElementById("imageInput").addEventListener("change", async function () {
      if (this.files.length === 0) return;
      const file = this.files[0];
      const formData = new FormData();
      formData.append("file", file);
      try {
        const response = await fetch("/upload-image", { method: "POST", body: formData });
        if (response.ok) {
          const data = await response.json();
          insertAtCursor(data.markdown);
        } else {
          alert("Image upload failed.");
        }
      } catch (error) {
        console.error("Error:", error);
      }
    });

  // Semantic Auto-Linking Logic
  let typingTimer;
  let currentSuggestion = "";

  document.getElementById('markdown-editor').addEventListener('keyup', function() {
      clearTimeout(typingTimer);
      // Wait 1.2 seconds after the user stops typing to analyze
      typingTimer = setTimeout(checkSemanticLink, 1200); 
  });

  async function checkSemanticLink() {
      const editor = document.getElementById('markdown-editor');
      // Grab the last 150 characters the user just typed for context
      const textToAnalyze = editor.value.substring(Math.max(0, editor.selectionEnd - 150), editor.selectionEnd);
      
      if (textToAnalyze.length < 25) return;

      try {
          const res = await fetch('/api/rag/suggest-link', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({text: textToAnalyze})
          });
          const data = await res.json();
          
          // Show the toast if the AI found a match that isn't the page we are currently editing
          if (data.suggestion && data.suggestion !== "{{ page_name }}") {
              currentSuggestion = data.suggestion;
              document.getElementById('suggested-page').innerText = currentSuggestion;
              document.getElementById('link-suggestion').classList.remove('hidden');
              
              // Fade the toast out automatically after 6 seconds to stay out of the way
              setTimeout(() => {
                  document.getElementById('link-suggestion').classList.add('hidden');
              }, 6000);
          }
      } catch(e) { console.log("Suggestion failed silently.") }
  }

  function applySuggestion() {
      if(!currentSuggestion) return;
      // Format as Markdown link
      const linkText = `[${currentSuggestion.split('/').pop()}](/wiki/${currentSuggestion})`;
      insertAtCursor(" " + linkText + " ");
      document.getElementById('link-suggestion').classList.add('hidden');
  }

  // Cursor Helper
  function insertAtCursor(text) {
    const editor = document.getElementById("markdown-editor");
    const startPos = editor.selectionStart;
    const endPos = editor.selectionEnd;
    editor.value =
      editor.value.substring(0, startPos) +
      text +
      editor.value.substring(endPos, editor.value.length);
    editor.focus();
    editor.selectionStart = startPos + text.length;
    editor.selectionEnd = startPos + text.length;
  }
</script>
{% endblock %}
