{% extends "base.html" %} 
{% block title %}Editing: {{ page_name }}{% endblock %} 

{% block content %}
<div class="flex justify-between items-center mb-4">
  <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">
    Editing: <span class="text-blue-600 dark:text-blue-400">{{ page_name }}</span>
  </h1>

  <div class="space-x-3">
    <input type="file" id="imageInput" class="hidden" accept="image/*" />
    <button
      type="button"
      onclick="document.getElementById('imageInput').click()"
      class="text-sm bg-gray-200 dark:bg-slate-700 text-gray-700 dark:text-gray-200 px-3 py-1 rounded hover:bg-gray-300 dark:hover:bg-slate-600 transition"
    >
      🖼️ Insert Image
    </button>
    <a
      href="/wiki/{{ page_name }}"
      class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 hover:underline"
      >Cancel</a
    >
  </div>
</div>

<div class="relative flex flex-col flex-grow">
    <form method="POST" action="/edit/{{ page_name }}" class="flex flex-col flex-grow">
      <textarea
        id="markdown-editor"
        name="content"
        rows="20"
        class="w-full p-4 border border-gray-300 dark:border-slate-700 rounded-lg bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-gray-100 font-mono text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none mb-4 custom-scrollbar"
      >{{ content }}</textarea>

      <div class="flex justify-end">
        <button
          type="submit"
          class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700 transition"
        >
          Save Page
        </button>
      </div>
    </form>

    <div id="link-suggestion" class="hidden absolute bottom-20 right-4 bg-teal-600 text-white px-4 py-3 rounded-lg shadow-xl text-sm flex items-center gap-4 transition-opacity z-50">
        <div>
            <span class="block text-xs text-teal-200 uppercase font-bold tracking-wider mb-1">Semantic Match Found</span>
            <span>Link to: <strong id="suggested-page" class="font-mono bg-teal-800 px-1 rounded"></strong></span>
        </div>
        <button onclick="applySuggestion()" class="bg-white text-teal-700 hover:bg-teal-50 font-bold px-3 py-1.5 rounded shadow-sm transition">
            Insert Link
        </button>
    </div>
</div>

<script>
  // Image Upload Logic
  document.getElementById("imageInput").addEventListener("change", async function () {
      if (this.files.length === 0) return;
      const file = this.files[0];
      const formData = new FormData();
      formData.append("file", file);
      try {
        const response = await fetch("/upload-image", { method: "POST", body: formData });
        if (response.ok) {
          const data = await response.json();
          insertAtCursor(data.markdown);
        } else {
          alert("Image upload failed.");
        }
      } catch (error) {
        console.error("Error:", error);
      }
    });

  // Semantic Auto-Linking Logic
  let typingTimer;
  let currentSuggestion = "";

  document.getElementById('markdown-editor').addEventListener('keyup', function() {
      clearTimeout(typingTimer);
      // Wait 1.2 seconds after the user stops typing to analyze
      typingTimer = setTimeout(checkSemanticLink, 1200); 
  });

  async function checkSemanticLink() {
      const editor = document.getElementById('markdown-editor');
      // Grab the last 150 characters the user just typed for context
      const textToAnalyze = editor.value.substring(Math.max(0, editor.selectionEnd - 150), editor.selectionEnd);
      
      if (textToAnalyze.length < 25) return;

      try {
          const res = await fetch('/api/rag/suggest-link', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({text: textToAnalyze})
          });
          const data = await res.json();
          
          // Show the toast if the AI found a match that isn't the page we are currently editing
          if (data.suggestion && data.suggestion !== "{{ page_name }}") {
              currentSuggestion = data.suggestion;
              document.getElementById('suggested-page').innerText = currentSuggestion;
              document.getElementById('link-suggestion').classList.remove('hidden');
              
              // Fade the toast out automatically after 6 seconds to stay out of the way
              setTimeout(() => {
                  document.getElementById('link-suggestion').classList.add('hidden');
              }, 6000);
          }
      } catch(e) { console.log("Suggestion failed silently.") }
  }

  function applySuggestion() {
      if(!currentSuggestion) return;
      // Format as Markdown link
      const linkText = `[${currentSuggestion.split('/').pop()}](/wiki/${currentSuggestion})`;
      insertAtCursor(" " + linkText + " ");
      document.getElementById('link-suggestion').classList.add('hidden');
  }

  // Cursor Helper
  function insertAtCursor(text) {
    const editor = document.getElementById("markdown-editor");
    const startPos = editor.selectionStart;
    const endPos = editor.selectionEnd;
    editor.value =
      editor.value.substring(0, startPos) +
      text +
      editor.value.substring(endPos, editor.value.length);
    editor.focus();
    editor.selectionStart = startPos + text.length;
    editor.selectionEnd = startPos + text.length;
  }
</script>
{% endblock %}
